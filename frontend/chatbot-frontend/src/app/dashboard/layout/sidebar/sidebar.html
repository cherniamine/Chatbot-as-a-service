<aside class="w-64 h-full bg-white/80 backdrop-blur-md border-r border-gray-100 p-4 dark:bg-gray-900/80 dark:border-gray-800 sticky top-0">
<div class="mb-12 flex items-center gap-3 px-1">
  <!-- Logo with subtle hover animation -->
  <img 
    src="assets/intro-img.webp" 
    alt="ChatNex Logo" 
    class="w-10 h-10 object-contain
           transition-all duration-300
           hover:scale-110 hover:rotate-6
           drop-shadow-[0_2px_4px_rgba(99,102,241,0.2)]
           dark:drop-shadow-[0_2px_6px_rgba(165,180,252,0.3)]"
  />
  
  <!-- Text with enhanced gradient -->
  <h1 class="text-2xl font-extrabold tracking-tight text-gray-900 dark:text-gray-100 select-none">
    <span class="bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400 bg-clip-text text-transparent
           transition-all duration-500
           hover:bg-gradient-to-r hover:from-blue-700 hover:to-indigo-700
           dark:hover:from-blue-300 dark:hover:to-indigo-300">
      {{ 'APP.TITLE' | translate }}
    </span>
  </h1>
</div>

  <nav class="space-y-1.5">
    <ng-container *ngIf="userRole === 'admin'">
      <a 
        routerLink="/dashboard/home" 
        routerLinkActive="bg-blue-50/80 text-blue-600 dark:bg-gray-800/80 dark:text-blue-400 border-l-4 border-blue-500" 
        [routerLinkActiveOptions]="{exact: true}"
        class="flex items-center gap-3 p-3 rounded-r-lg text-gray-700 hover:bg-gray-100/50 dark:text-gray-300 dark:hover:bg-gray-800/50 transition-all group"
      >
        <div class="p-1.5 rounded-lg bg-blue-50 dark:bg-gray-800 group-hover:bg-blue-100 dark:group-hover:bg-gray-700 transition-colors">
          <lucide-icon name="home" class="w-5 h-5 text-blue-600 dark:text-blue-400"></lucide-icon>
        </div>
        <span class="font-medium">{{ 'SIDEBAR.HOME' | translate }}</span>
        <div class="ml-auto w-2 h-2 rounded-full bg-blue-500 animate-pulse" *ngIf="activeNotifications.home"></div>
      </a>

      <a 
        routerLink="/dashboard/documents" 
        routerLinkActive="bg-blue-50/80 text-blue-600 dark:bg-gray-800/80 dark:text-blue-400 border-l-4 border-blue-500" 
        class="flex items-center gap-3 p-3 rounded-r-lg text-gray-700 hover:bg-gray-100/50 dark:text-gray-300 dark:hover:bg-gray-800/50 transition-all group"
      >
        <div class="p-1.5 rounded-lg bg-blue-50 dark:bg-gray-800 group-hover:bg-blue-100 dark:group-hover:bg-gray-700 transition-colors">
          <lucide-icon name="file-text" class="w-5 h-5 text-blue-600 dark:text-blue-400"></lucide-icon>
        </div>
        <span class="font-medium">{{ 'SIDEBAR.DOCUMENTS' | translate }}</span>
        
      </a>
    </ng-container>

    <a 
      routerLink="/dashboard/chatbots" 
      routerLinkActive="bg-blue-50/80 text-blue-600 dark:bg-gray-800/80 dark:text-blue-400 border-l-4 border-blue-500" 
      class="flex items-center gap-3 p-3 rounded-r-lg text-gray-700 hover:bg-gray-100/50 dark:text-gray-300 dark:hover:bg-gray-800/50 transition-all group"
    >
      <div class="p-1.5 rounded-lg bg-blue-50 dark:bg-gray-800 group-hover:bg-blue-100 dark:group-hover:bg-gray-700 transition-colors">
        <lucide-icon name="bot" class="w-5 h-5 text-blue-600 dark:text-blue-400"></lucide-icon>
      </div>
      <span class="font-medium">{{ 'SIDEBAR.CHATBOTS' | translate }}</span>
      <span class="ml-auto px-2 py-0.5 text-xs rounded-full bg-blue-100 text-blue-800 dark:bg-blue-900/50 dark:text-blue-300">{{'NEW'| translate }}</span>
    </a>

    <ng-container *ngIf="userRole === 'user'">
      <a 
        routerLink="/dashboard/history" 
        routerLinkActive="bg-blue-50/80 text-blue-600 dark:bg-gray-800/80 dark:text-blue-400 border-l-4 border-blue-500" 
        class="flex items-center gap-3 p-3 rounded-r-lg text-gray-700 hover:bg-gray-100/50 dark:text-gray-300 dark:hover:bg-gray-800/50 transition-all group"
      >
        <div class="p-1.5 rounded-lg bg-blue-50 dark:bg-gray-800 group-hover:bg-blue-100 dark:group-hover:bg-gray-700 transition-colors">
          <lucide-icon name="history" class="w-5 h-5 text-blue-600 dark:text-blue-400"></lucide-icon>
        </div>
        <span class="font-medium">{{ 'SIDEBAR.HISTORY' | translate }}</span>
      </a>
    </ng-container>

   
  </nav>

  <!-- User profile mini-card en bas -->
  <div class="absolute bottom-4 left-4 right-4 p-3 rounded-lg bg-gray-100/50 dark:bg-gray-800/50 backdrop-blur-sm flex items-center gap-3">
    <img 
      [src]="avatarUrl" 
      (error)="avatarUrl = 'assets/user-avatar.png'"
      alt="User" 
      class="w-9 h-9 rounded-full border-2 border-white dark:border-gray-800 shadow-sm" 
    />
    <div class="truncate">
      <p class="text-sm font-medium text-gray-800 dark:text-white truncate">{{ userName }}</p>
      <p class="text-xs text-gray-500 dark:text-gray-400 truncate">{{ userEmail }}</p>
    </div>
  </div>
</aside>
