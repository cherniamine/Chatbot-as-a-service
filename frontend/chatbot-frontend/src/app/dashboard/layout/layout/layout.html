<!-- Layout wrapper -->
<div class="relative h-screen w-full overflow-hidden bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">

  <!-- Fond abstrait géométrique moderne -->
  <div class="absolute inset-0 overflow-hidden opacity-90 dark:opacity-95">
    <!-- Lignes dynamiques animées -->
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_transparent_0%,_rgba(99,102,241,0.05)_70%)] dark:bg-[radial-gradient(circle_at_center,_transparent_0%,_rgba(99,102,241,0.02)_70%)]"></div>
    <div class="absolute inset-0 bg-[linear-gradient(135deg,_rgba(59,130,246,0.04)_0%,_transparent_50%,_rgba(168,85,247,0.04)_100%)] dark:bg-[linear-gradient(135deg,_rgba(59,130,246,0.02)_0%,_transparent_50%,_rgba(168,85,247,0.02)_100%)]"></div>
    
    <!-- Points connectés animés -->
    <svg class="absolute inset-0 w-full h-full" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="connected-dots" width="40" height="40" patternUnits="userSpaceOnUse">
          <circle cx="20" cy="20" r="0.5" fill="currentColor" class="text-indigo-400/20 dark:text-indigo-500/10"/>
          <path d="M20 20L40 40" stroke="currentColor" stroke-width="0.3" class="text-indigo-400/10 dark:text-indigo-500/05"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#connected-dots)"></rect>
    </svg>
  </div>

  <!-- Conteneur principal en verre teinté -->
  <div class="relative h-full w-full backdrop-blur-[12px] bg-white/70 dark:bg-gray-900/85 border border-white/20 dark:border-gray-700/40 shadow-2xl overflow-hidden transition-all duration-300">

    <!-- Effet de bordure lumineuse dynamique -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div class="absolute inset-0 bg-[conic-gradient(from_var(--angle),transparent_10%,oklch(0.7_0.25_0)_25%,oklch(0.7_0.25_120)_50%,oklch(0.7_0.25_240)_75%,transparent_90%)] opacity-20 dark:opacity-15 animate-rotate-pulse mix-blend-overlay"></div>
    </div>

    <!-- Structure du layout -->
    <div class="flex h-full">
      <!-- Sidebar avec effet verre -->
      <app-sidebar class="border-r border-gray-200/20 dark:border-gray-700/30 bg-white/40 dark:bg-gray-900/60 backdrop-blur-[8px] transition-colors duration-300"></app-sidebar>
      
      <!-- Contenu principal -->
      <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Navbar avec effet verre -->
        <div class="flex-1 flex flex-col overflow-hidden">
          <!-- Navbar - doit avoir un z-index plus élevé -->
          <app-navbar class="border-b border-gray-200/20 dark:border-gray-700/30 bg-white/50 dark:bg-gray-900/70 backdrop-blur-[8px] z-20 transition-colors duration-300"></app-navbar>
          
          <!-- Zone de contenu -->
          <main class="flex-1 overflow-y-auto p-6 relative">
            <!-- Micro-interaction hover sur le contenu -->
            <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_rgba(99,102,241,0.08)_0%,_transparent_70%)] dark:bg-[radial-gradient(ellipse_at_center,_rgba(99,102,241,0.04)_0%,_transparent_70%)] opacity-0 hover:opacity-100 transition-opacity duration-300 pointer-events-none"></div>
            <router-outlet></router-outlet>
          </main>
        </div>
      </div>
    </div>
  </div>
</div>
