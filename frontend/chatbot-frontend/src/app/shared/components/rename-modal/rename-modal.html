<div class="p-5 bg-white dark:bg-gray-900 rounded-xl shadow-xl w-full max-w-md">
  <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">
    ✏️ {{ 'MODAL.RENAME_TITLE' | translate }}
  </h2>

  <mat-form-field appearance="fill" class="w-full">
    <mat-label>{{ 'MODAL.RENAME_PLACEHOLDER' | translate }}</mat-label>
    <input matInput [(ngModel)]="newName" />
  </mat-form-field>

  <div class="flex justify-end gap-3 mt-6">
    <button mat-stroked-button (click)="cancel()">{{ 'COMMON.CANCEL' | translate }}</button>
    <button 
      mat-flat-button 
      color="primary" 
      (click)="confirmRename()" 
      [disabled]="!newName.trim()">
      {{ 'MODAL.CONFIRM' | translate }}
    </button>
  </div>
</div>
