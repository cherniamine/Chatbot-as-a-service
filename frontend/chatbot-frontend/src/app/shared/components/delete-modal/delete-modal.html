<div
  *ngIf="isOpen"
  @fade
  class="fixed inset-0 z-50 bg-black bg-opacity-40 backdrop-blur-sm flex items-center justify-center"
>
  <div
    @scaleIn
    class="bg-white dark:bg-gray-900 rounded-xl shadow-2xl p-6 w-full max-w-md border dark:border-gray-700"
  >
    <h2 class="text-xl font-semibold text-gray-900 dark:text-white mb-2">
      {{ title | translate }}
    </h2>
    <p class="text-gray-700 dark:text-gray-300 mb-5">
      {{ message | translate }}
    </p>

    <div class="flex justify-end space-x-3">
      <button
        (click)="onCancel()"
        class="px-4 py-2 rounded-md border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition"
      >
        {{ 'COMMON.CANCEL' | translate }}
      </button>
      <button
        (click)="onConfirm()"
        class="px-4 py-2 rounded-md bg-red-600 text-white hover:bg-red-700 transition"
      >
        {{ 'COMMON.DELETE' | translate }}
      </button>
    </div>
  </div>
</div>
