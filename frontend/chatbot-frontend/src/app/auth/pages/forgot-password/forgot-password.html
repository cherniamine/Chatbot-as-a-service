<div class="min-h-screen flex items-center justify-center relative bg-gradient-to-br from-indigo-900/70 via-purple-900/60 to-blue-900/50 p-4">
  
  <ng-lottie [options]="robotOptions" class="absolute bottom-10 left-10 w-40 h-40 pointer-events-none opacity-90"></ng-lottie>

  <div class="max-w-md w-full bg-white/90 dark:bg-gray-800/90 backdrop-blur-lg rounded-2xl shadow-2xl p-8 space-y-6 border border-gray-200/50 dark:border-gray-700/50 relative z-10">
    <h2 class="text-2xl font-bold text-center text-gray-900 dark:text-white mb-4">Mot de passe oublié ?</h2>
    <p class="text-sm text-gray-500 dark:text-gray-400 text-center mb-6">
      Entrez votre email pour recevoir un lien de réinitialisation
    </p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="space-y-4">
      <input 
        type="email" 
        placeholder="exemple@domaine.com"
        formControlName="email"
        class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all"
        [class.border-red-500]="form.get('email')?.invalid && form.get('email')?.touched"
      />
      <p *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="text-red-500 text-xs">
        Veuillez entrer un email valide.
      </p>

      <button type="submit" [disabled]="form.invalid || isLoading"
        class="w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-medium rounded-lg shadow-md hover:scale-[1.02] transition-all">
        <span *ngIf="!isLoading">Envoyer le lien</span>
        <span *ngIf="isLoading">Envoi...</span>
      </button>
    </form>

    <app-toast *ngIf="showToast" [message]="toastMessage" [duration]="toastDuration" (animationDone)="showToast=false"></app-toast>
  </div>
</div>
