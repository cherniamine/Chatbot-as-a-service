<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8 space-y-6 text-center">
    <h2 class="text-2xl font-bold text-green-600">{{ message }}</h2>
    <p *ngIf="redirecting" class="text-gray-600">Redirection vers la page de connexion...</p>
  </div>
</div>

<!-- Toast de succès ou d'erreur -->
<app-toast
  *ngIf="showToast"
  [message]="toastMessage"
  [duration]="toastDuration"
  (animationDone)="showToast = false"
></app-toast>
